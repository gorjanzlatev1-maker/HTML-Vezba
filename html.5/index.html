<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">


        <div class="card">
            <div class="picture">
                <img src="weather.png" alt="rainy">
            </div>
            <div class="top">
                <p class="location">📍 New York</p>
                <h2>Tuesday - May 22</h2>
                <h1>7:42 AM</h1>

                <div class="info">
                    <p>Feels like: 23°</p>
                    <p>Wind: 5 km/h</p>
                </div>
            </div>

            <div class="weather-main">
                <h2>23°</h2>
                <p>Thunder</p>
            </div>

            <!-- WEEK -->
            <div class="week">
                <div class="day">
                    <p>TUE</p>
                    <span>🌧️</span>
                    <p>30° / 25°</p>
                </div>
                <div class="day">
                    <p>WED</p>
                    <span>⛅</span>
                    <p>32° / 28°</p>
                </div>
                <div class="day">
                    <p>THU</p>
                    <span>☀️</span>
                    <p>34° / 29°</p>
                </div>
                <div class="day">
                    <p>FRI</p>
                    <span>⛈️</span>
                    <p>25° / 19°</p>
                </div>
                <div class="day">
                    <p>SAT</p>
                    <span>🌤️</span>
                    <p>35° / 29°</p>
                </div>
            </div>
        </div>


        <div class="sidebar">
            <p>🌤 Weather</p>
            <p>🔔 Alert</p>
            <p>⏰ Time</p>
            <p>📍 City</p>
        </div>

    </div>

</body>

</html>
